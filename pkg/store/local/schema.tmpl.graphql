# ============================================================
# Sessions — agent conversation sessions (including sub-agents)
# ============================================================

"""A conversation session — one thread of interaction. Root sessions are user-initiated. Sub-agent sessions have parent_session_id set. Team agents support multiple participants in one session."""
type sessions @table(name: "sessions") @module(name: "agent") {
  """ADK session ID (= A2A Task ID)"""
  id:                String! @pk
  """Agent running this session"""
  agent_id:          String! @field_references(
    references_name: "agents"
    field: "id"
    query: "agent"
    description: "Agent running this session"
    references_query: "sessions"
    references_description: "Conversation sessions for this agent"
  )
  """Session owner (OIDC subject who started it). For team agents: the user who initiated."""
  owner_id:          String
  """NULL = root session. Set for forks (inherit history) and sub-agents (own context)"""
  parent_session_id: String  @field_references(
    references_name: "sessions"
    field: "id"
    query: "parent_session"
    description: "Parent session — for forks (shared history) or sub-agents (separate context)"
    references_query: "child_sessions"
    references_description: "Forked or sub-agent sessions derived from this session"
  )
  """For forked sessions: inherit parent events up to this seq number. NULL = sub-agent (own context, no inherited history). Use session_events_full view to get complete history with inherited events."""
  fork_after_seq:    Int
  """Discriminator: 'root' (user-initiated), 'subagent' (agent-spawned, isolated context), 'fork' (reserved for future user-initiated forks). Runtime branches on this column, NOT on parent_session_id presence."""
  session_type:      String! @default(value: "root")
  """For sub-agents: id of the session_events row on the parent that carried the dispatch tool_call. NULL for root sessions."""
  spawned_from_event_id: String @field_references(
    references_name: "session_events"
    field: "id"
    query: "spawn_event"
    description: "Event on the parent session that spawned this sub-agent (NULL for root sessions)"
    references_query: "spawned_sessions"
    references_description: "Sub-agent sessions spawned from this event"
  )
  """Lifecycle: active|completed|abandoned|failed"""
  status:            String  @default(value: "active")
  """Sub-agent: task description. Fork: NULL or user's question"""
  mission:           String
  """Flexible metadata: {model, total_tokens, skill_loaded, topology, ...}"""
  metadata:          JSON
  """Session start time"""
  created_at:        Timestamp @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "objects.created_at")
  """Last activity"""
  updated_at:        Timestamp @default(update_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}")
}

# ============================================================
# Session participants — multi-user sessions (team agents)
# ============================================================

"""Tracks who participates in a session. Personal agent: one row (owner). Team agent: multiple users + agent itself. Observers can watch but not interact."""
type session_participants @table(name: "session_participants") @module(name: "agent") {
