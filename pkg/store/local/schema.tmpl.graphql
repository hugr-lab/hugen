# ============================================================
# Session events — full conversation transcript (append-only)
# ============================================================

"""One event in a session: user message, agent response, tool call/result, sub-agent spawn/result, system event. Append-only — this IS the transcript for post-session review. Eligible event types carry a semantic embedding (populated server-side via Hugr's `summary:` mutation parameter)."""
type session_events @table(name: "session_events") @module(name: "agent")
  {{ if gt .VectorSize 0 }}@embeddings(model: "{{ .EmbedderModel }}", vector: "embedding", distance: Cosine){{ end }}
  {{ if .IsTimescale }}@hypertable{{ end }} {
  """Synthetic sortable ID: evt_{agent}_{ts}_{rnd}"""
  id:          String! @pk
  """Session this event belongs to"""
  session_id:  String! @field_references(
    references_name: "sessions"
    field: "id"
    query: "session"
    description: "Session containing this event"
    references_query: "events"
    references_description: "Transcript events in this session"
  )
  """Agent that produced this event"""
  agent_id:    String!
  """Event order within session (monotonically increasing)"""
  seq:         Int!
  """Event type: user_message|agent_message|tool_call|tool_result|agent_spawn|agent_result|agent_abstained|summary|system"""
  event_type:  String!
  """Who authored: user_id for human messages, 'agent' for agent, 'tool' for tool results, 'system' for system events. In team sessions: specific user_id identifies which participant spoke"""
  author:      String!
  """Text content of the event"""
  content:     String
  """Tool name (for tool_call / tool_result events)"""
  tool_name:   String
  """Tool call arguments as JSON"""
  tool_args:   JSON
  """Tool result text (may be large)"""
  tool_result: String
  """Flexible metadata: {channel, intent, tokens, model, duration_ms, child_session_id, reason, ...}"""
  metadata:    JSON
  """When this event occurred"""
  created_at:  Timestamp {{ if .IsTimescale }}@pk @timescale_key{{ end }} @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "objects.created_at")
  {{ if gt .VectorSize 0 }}
  """Semantic embedding of content. NULL for lifecycle events / oversize / transient embedder failures. Populated atomically with insert via the `summary:` mutation parameter."""
  embedding:   Vector @dim(len: {{ .VectorSize }})
  {{ end }}
}

# ============================================================
# Session events full — VIEW with inherited history for forks
# ============================================================

"""Complete event history for a session, including inherited events from parent chain for forked sessions. No data duplication — recursive CTE starts from the given session_id. For sub-agents (session_type='subagent'): returns only own events (chain walk short-circuits). Max depth: 3."""
type session_events_full @view(
  name: "session_events_full"
  sql: """
    WITH RECURSIVE session_chain AS (
      SELECT id, parent_session_id, fork_after_seq, session_type,
             NULL::INTEGER AS inherit_limit,
             0 AS depth
      FROM [sessions]
      WHERE id = [$session_id]

      UNION ALL

      SELECT p.id, p.parent_session_id, p.fork_after_seq, p.session_type,
             sc.fork_after_seq AS inherit_limit,
             sc.depth + 1
      FROM [sessions] p
      JOIN session_chain sc ON p.id = sc.parent_session_id
      WHERE sc.session_type != 'subagent'
        AND sc.fork_after_seq IS NOT NULL
        AND sc.depth < 3
    )
    SELECT e.*, sc.depth AS chain_depth
    FROM [session_events] e
    JOIN session_chain sc ON e.session_id = sc.id
    WHERE sc.depth = 0 OR e.seq <= sc.inherit_limit
    ORDER BY sc.depth DESC, e.seq ASC
  """
) @args(name: "session_events_full_input", required: true) @module(name: "agent") {
  id:          String!
  session_id:  String! @field_references(
    references_name: "sessions"
    field: "id"
    query: "session"
    description: "Session this event belongs to (may be a parent in the chain)"
  )
  agent_id:    String!
  seq:         Int!
  event_type:  String!
  author:      String!
  content:     String
  tool_name:   String
  tool_args:   JSON
  tool_result: String
  metadata:    JSON
  created_at:  Timestamp
  """0 = own event, 1+ = inherited from parent chain (higher = older ancestor)"""
  chain_depth: Int!
}

"""Input for parameterized session_events_full view"""
input session_events_full_input {
  """Session ID to get full history for (including inherited parent events)"""
  session_id: String!
}

# ============================================================
# Session events chain — view returning every event visible to
# a session including sub-agent events. Phase-4 (spec 008) consumer
# for coordinator-scope semantic search. NO session_type filter
# (deliberately distinct from session_events_full's behaviour).
# ============================================================

"""Recursive walk over parent_session_id (depth cap 8). Returns every event from the given session AND every ancestor session — including sub-agent events. Distinct from session_events_full (which excludes sub-agent events for ADK conversation replay). Used for coordinator-scope semantic search across the entire conversation tree."""
type session_events_chain @view(
  name: "session_events_chain"
  sql: """
    WITH RECURSIVE chain AS (
      SELECT id, parent_session_id, 0 AS depth
      FROM [sessions]
      WHERE id = [$session_id]

      UNION ALL

      SELECT p.id, p.parent_session_id, c.depth + 1
      FROM [sessions] p
      JOIN chain c ON p.id = c.parent_session_id
      WHERE c.depth < 8
    )
    SELECT e.*, c.depth AS chain_depth
    FROM [session_events] e
    JOIN chain c ON e.session_id = c.id
    ORDER BY c.depth ASC, e.created_at DESC
  """
) @args(name: "session_events_chain_input", required: true) @module(name: "agent") {
  id:          String!
  session_id:  String! @field_references(
    references_name: "sessions"
    field: "id"
    query: "session"
    description: "Session that owns this event"
  )
  agent_id:    String!
  seq:         Int!
  event_type:  String!
  author:      String!
  content:     String
  tool_name:   String
  tool_args:   JSON
  tool_result: String
  metadata:    JSON
  created_at:  Timestamp
  """0 = own event, 1+ = ancestor session"""
  chain_depth: Int!
}

"""Input for parameterized session_events_chain view"""
input session_events_chain_input {
  """Starting session ID — chain walks up from here"""
  session_id: String!
}

# ============================================================
# Session notes — per-root-session working notepad (phase 4.2.3)
# ============================================================
#
# Hypotheses-not-facts scratchpad shared across all missions inside
# one root conversation. Append-only — runtime never UPDATEs;
# `notepad:append` writes; old notes fall out of model visibility
# via a configurable read window (default 48h) rather than being
# deleted. Storage location is always the root session of the
# parent chain — the extension climbs `RootAncestor()` before
# writing. The `session_notes_chain` view below preserves the
# legacy parent-walk surface for observability.

"""Per-root-session working notepad — hypotheses recorded by the LLM mid-conversation. Append-only (no UPDATEs, no soft delete). Storage column session_id is always the root of the parent chain; author_session_id carries the actual writing session for audit. Eligible rows carry a semantic embedding populated server-side via Hugr's `summary:` mutation parameter."""
type session_notes @table(name: "session_notes") @module(name: "agent")
  {{ if .EmbeddingsEnabled }}@embeddings(model: "{{ .EmbedderModel }}", vector: "embedding", distance: Cosine){{ end }} {
  """Synthetic sortable ID: note_{agent}_{ts}_{rnd}"""
  id:          String! @pk
  """Agent that saved this note"""
  agent_id:    String! @field_references(
    references_name: "agents"
    field: "id"
    query: "agent"
    description: "Agent that saved this note"
    references_query: "session_notes"
    references_description: "Session notes saved by this agent"
  )
  """Storage location — always the ROOT of the writing session's parent chain. Phase 4.2.3 extension climbs `RootAncestor()` before insert so every session in the tree sees the same notepad via `session_id == root.id`."""
  session_id:  String! @field_references(
    references_name: "sessions"
    field: "id"
    query: "session"
    description: "Root session the note is stored under"
    references_query: "notes"
    references_description: "Notes stored at this root session"
  )
  """Authoring session — may differ from session_id when a sub-agent's notepad:append climbs to root. Audit trail; never used for visibility filtering."""
  author_session_id: String @field_references(
    references_name: "sessions"
    field: "id"
    query: "author_session"
    description: "Session that wrote this note"
    references_query: "authored_notes"
    references_description: "Notes authored by this session (stored under its root)"
  )
  """Open-string filtering tag, model-supplied at notepad:append time. Skill's `mission.on_start.notepad.tags` may advertise recommended values; runtime accepts any string."""
  category:    String
  """Tier of the authoring session at write time: `agent` (root, depth 0), `coordinator` (mission, depth 1), `worker` (depth >= 2). Set by runtime from author's tier."""
  author_role: String
  """Model-supplied short context phrase — "what does the writing session think it is working on right now". Optional; empty acceptable. Independent of sessions.mission (which is the formal spawn goal set by runtime at spawn_mission)."""
  mission:     String
  """Note text — concise, self-contained hypothesis. Treat as observation under uncertainty (phase 7 distillation validates)."""
  content:     String!
  """When this note was saved"""
  created_at:  Timestamp @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "objects.created_at")
  {{ if .EmbeddingsEnabled }}
  """Semantic embedding of content. NULL for transient embedder failures. Populated atomically with insert via the `summary:` mutation parameter — the runtime passes the note content as the summary string."""
  embedding:   Vector @dim(len: {{ .VectorSize }})
  {{ end }}
}

# ============================================================
# Session notes chain — view returning all notes visible to a
# session (own + ancestor chain). Drives Snapshot's `## Session
# notes` block; depth cap 8 mirrors session_events_chain.
# ============================================================

"""Recursive walk over parent_session_id (depth cap 8). Returns every note visible to the given session — own notes + every ancestor's notes. Phase 4.2.3 stores all notes at the root via the extension's climb-to-root, so the chain view collapses to "notes at the root" for normal sessions; the recursive form is retained for observability and to keep pre-4.2.3 rows reachable. Ordered by (chain_depth ASC, created_at DESC)."""
type session_notes_chain @view(
  name: "session_notes_chain"
  sql: """
    WITH RECURSIVE chain AS (
      SELECT id, parent_session_id, 0 AS depth
      FROM [sessions]
      WHERE id = [$session_id]

      UNION ALL

      SELECT p.id, p.parent_session_id, c.depth + 1
      FROM [sessions] p
      JOIN chain c ON p.id = c.parent_session_id
      WHERE c.depth < 8
    )
    SELECT n.*, c.depth AS chain_depth
    FROM [session_notes] n
    JOIN chain c ON n.session_id = c.id
    ORDER BY c.depth ASC, n.created_at DESC
  """
) @args(name: "session_notes_chain_input", required: true) @module(name: "agent") {
  id:                String!
  agent_id:          String!
  session_id:        String! @field_references(
    references_name: "sessions"
    field: "id"
    query: "session"
    description: "Root session the note is stored under"
  )
  author_session_id: String @field_references(
    references_name: "sessions"
    field: "id"
    query: "author_session"
    description: "Session that wrote this note"
  )
  category:          String
  author_role:       String
  mission:           String
  content:           String!
  created_at:        Timestamp
  """0 = own / root note, 1+ = ancestor session's note"""
  chain_depth:       Int!
}

"""Input for parameterized session_notes_chain view"""
input session_notes_chain_input {
  """Starting session ID — chain walks up from here"""
  session_id: String!
}

