  """Typed configuration body — projected from the JSON column."""
  spec:             JSON!
  """When paused: 'user' | 'skill_changed' | 'schema_changed' | 'render_failed' | 'owner_terminated'. NULL while active. Written atomically with status='paused'."""
  pause_reason:     String
  """Created at"""
  created_at:       Timestamp @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "objects.created_at")
