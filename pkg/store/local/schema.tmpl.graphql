  created_at:      Timestamp @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "objects.created_at")
  """When verification was attempted"""
  checked_at:      Timestamp
  """Verification evidence text"""
  result:          String
  """If confirmed: ID of the created fact"""
  fact_id:         String  @field_references(
    references_name: "memory_items"
    field: "id"
    query: "confirmed_fact"
    description: "Fact created when this hypothesis was confirmed"
