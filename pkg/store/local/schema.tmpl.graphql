# Memory Storage — Hugr SDL (Go template)
#
# Template params:
#   .VectorSize        int    — embedding dimension (0 = no embeddings)
#   .EmbeddingsEnabled bool   — .VectorSize > 0
#   .EmbedderModel     string — hugr data source name for embedder
#   .IsTimescale       bool   — true if PostgreSQL with TimescaleDB
#
# Data source: Name="hub.db", AsModule=true
# APPEND-ONLY: no UPDATE. Reinforce/Supersede = DELETE + INSERT.
# IDs generated by Go (synthetic sortable, not DB-generated).
#
# GraphQL path: { hub { db { ... } } }
# Module "agent" nests under: { hub { db { agent { ... } } } }

# ============================================================
# Version — schema + embedder identity pins
# ============================================================

"""Internal pin table — schema version + embedder model identity written at provisioning time (spec 006 §5d). Queried at startup to enforce the "embedder model cannot change under existing vectors" invariant."""
type version @table(name: "version") {
  """Pin key: 'schema' | 'embedder_model' | 'embedding_model' (legacy) | 'embedding_dim'"""
  name:    String! @pk
  """Pinned value for the key (schema version, model name, dim)"""
  version: String!
}

# ============================================================
# Agent types — configuration templates for agent behavior
# ============================================================

"""Agent type defines a reusable configuration template: constitution, skills, LLM routes, memory rules. Multiple agent instances can share the same type."""
type agent_types @table(name: "agent_types") {
  """Unique identifier, e.g. 'hugr-data-agent'"""
  id:            String! @pk
  """Human-readable name"""
  name:          String!
  """What this agent type does"""
  description:   String
  """Full configuration: {constitution, skills, llm, memory, embedding}"""
  config:        JSON
  """When this type was created"""
  created_at:    Timestamp @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "objects.created_at")
  """When configuration was last changed"""
  updated_at:    Timestamp @default(update_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}")
  """Soft delete timestamp"""
  deleted_at:    Timestamp
}

# ============================================================
# Agents — running instances of an agent type
# ============================================================

"""An agent instance — one running process or logical identity. Standalone: one row. Hub: one per deployment."""
type agents @table(name: "agents") {
  """Synthetic ID: agt_{short_id}"""
  id:              String! @pk
  """Configuration template for this agent"""
  agent_type_id:   String! @field_references(
    references_name: "agent_types"
    field: "id"
    query: "agent_type"
    description: "Configuration template for this agent"
    references_query: "agents"
    references_description: "Agent instances using this type"
  )
  """Short 4-char alias used in synthetic ID generation (e.g. 'ag01')"""
  short_id:        String!
  """Human-readable agent name"""
  name:            String!
  """Lifecycle: active | paused | archived"""
  status:          String  @default(value: "active")
  """Per-instance config overrides (merged on top of agent_type.config)"""
  config_override: JSON
  """When this agent was registered"""
  created_at:      Timestamp @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "objects.created_at")
  """Last time this agent processed a request"""
  last_active:     Timestamp @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}")
  """Soft delete timestamp"""
  deleted_at:      Timestamp
}

# ============================================================
# Memory items — persistent facts with tags, links, embeddings
# ============================================================

"""A self-contained fact in long-term memory. Created by post-session review, never by LLM directly during session. Has temporal validity, tags for filtering, links for graph navigation, and optional embedding for vector search."""
type memory_items @table(name: "memory_items") @module(name: "agent")
  {{ if .EmbeddingsEnabled }}@embeddings(model: "{{ .EmbedderModel }}", vector: "embedding", distance: Cosine){{ end }} {

  """Synthetic sortable ID: mem_{agent}_{ts}_{rnd}"""
  id:          String! @pk
  """Agent that owns this fact"""
  agent_id:    String! @field_references(
    references_name: "agents"
    field: "id"
    query: "agent"
    description: "Agent owning this memory item"
    references_query: "memory_items"
    references_description: "Facts stored by this agent"
  )
  """Self-contained fact text — must be understandable without context"""
  content:     String!
  """Category from skill memory.yaml (schema, query_template, anti_pattern, field_values, data_insight, user_preference, reasoning_pattern)"""
  category:    String!
  """How quickly this fact may become stale: stable|slow|moderate|fast|volatile"""
  volatility:  String  @default(value: "stable")
  """Relevance score: higher = more important. Boosted on reinforce, initial from category config"""
  score:       Float   @default(value: "0.5")
  """How this fact was created: review:{session_id}, hypothesis_verified:{id}, user:{session_id}"""
  source:      String
  """When this fact was observed"""
  valid_from:  Timestamp!
  """When this fact expires (computed: valid_from + volatility duration). Search filters by valid_to > now"""
  valid_to:    Timestamp!
  """Record creation time"""
  created_at:  Timestamp @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "objects.created_at")
  {{ if .EmbeddingsEnabled }}"""Vector embedding for similarity search"""
  embedding:   Vector @dim(len: {{ .VectorSize }}){{ end }}
  """Whether this fact is currently valid (not expired). Computed: valid_to > now"""
  is_valid:    Boolean! @sql(exp: "[valid_to] > {{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}")
  """Days since this fact was observed. Computed from valid_from"""
  age_days:    Int! @sql(exp: "{{ if isPostgres }}DATE_PART('day', NOW() - [valid_from])::INT{{ else }}DATEDIFF('day', [valid_from], CURRENT_TIMESTAMP){{ end }}")
  """Days until this fact expires. Negative = already expired"""
  expires_in_days: Int! @sql(exp: "{{ if isPostgres }}DATE_PART('day', [valid_to] - NOW())::INT{{ else }}DATEDIFF('day', CURRENT_TIMESTAMP, [valid_to]){{ end }}")
}

# ============================================================
# Memory log — audit trail for all memory operations
# ============================================================

"""Append-only audit log for all memory operations. Event types: retrieve (search hit), store (new fact), reinforce (score bump), supersede (replace), delete, add_tag, remove_tag, add_link, remove_link. Enables: used_count = COUNT(*) WHERE event_type='retrieve', last_used = MAX(created_at) WHERE event_type='retrieve'. Full debug history for any fact."""
type memory_log @table(name: "memory_log") @module(name: "agent")
  {{ if .IsTimescale }}@hypertable{{ end }} {
  """When this operation occurred"""
  event_time: Timestamp! @pk {{ if .IsTimescale }}@timescale_key{{ end }} @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "objects.event_time")
  """Operation type: retrieve|store|reinforce|supersede|delete|add_tag|remove_tag|add_link|remove_link"""
  event_type: String! @pk
  """Fact this operation applies to"""
  memory_item_id: String! @pk @field_references(
    references_name: "memory_items"
    field: "id"
    query: "memory_item"
    description: "Fact this operation applies to"
    references_query: "log"
    references_description: "Audit log for this fact"
  )
  """Session where this operation happened (NULL for background tasks like consolidation)"""
  session_id: String  @pk @field_references(
    references_name: "sessions"
    field: "id"
    query: "session"
    description: "Session context of this operation"
  )
  """Agent that performed this operation"""
  agent_id:       String! @field_references(
    references_name: "agents"
    field: "id"
    query: "agent"
    description: "Agent that performed this operation"
    references_query: "memory_log"
    references_description: "Memory operations performed by this agent"
  )
  """Operation details: {old_score, new_score, tag, link_target_id, superseded_by, reason, ...}"""
  details:        JSON
}

# ============================================================
# Memory tags — topic labels for filtering and clustering
# ============================================================

"""One tag per row per fact. Enables: JOIN, WHERE tag = 'tf', GROUP BY tag — no array scanning."""
type memory_tags @table(name: "memory_tags") @module(name: "agent") {
  """Fact this tag belongs to"""
  memory_item_id: String! @pk @field_references(
    references_name: "memory_items"
    field: "id"
    query: "memory_item"
    description: "Fact this tag is attached to"
    references_query: "tags"
    references_description: "Tags on this fact"
  )
  """Tag value, e.g. 'tf', 'incidents', 'schema', 'severity'"""
  tag:            String! @pk
}

# ============================================================
# Memory links — directed edges between related facts
# ============================================================

"""A directional relationship between two facts. Enables knowledge graph navigation: schema → query templates → anti-patterns."""
type memory_links @table(name: "memory_links") @module(name: "agent") {
  """Fact this link originates from"""
  source_id:  String! @pk @field_references(
    references_name: "memory_items"
    field: "id"
    query: "source"
    description: "Origin fact of this link"
    references_query: "outgoing_links"
    references_description: "Links from this fact to other facts"
  )
  """Fact this link points to"""
  target_id:  String! @pk @field_references(
    references_name: "memory_items"
    field: "id"
    query: "target"
    description: "Destination fact of this link"
    references_query: "incoming_links"
    references_description: "Links from other facts pointing to this fact"
  )
  """Relationship type: uses, corrects, extends, supersedes, related"""
  relation:   String
  """When this link was created"""
  created_at: Timestamp @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "objects.created_at")
  """When this link expires (NULL = valid forever). Set when source or target is soft-deleted"""
  valid_to:   Timestamp
}

# ============================================================
# Hypotheses — testable statements for background verification
# ============================================================

"""A testable statement extracted by post-session review. Verified in background by sub-agent. Lifecycle: proposed → checking → confirmed|rejected|expired."""
type hypotheses @table(name: "hypotheses") @module(name: "agent") {
  """Synthetic sortable ID: hyp_{agent}_{ts}_{rnd}"""
  id:              String! @pk
  """Agent that owns this hypothesis"""
  agent_id:        String! @field_references(
    references_name: "agents"
    field: "id"
    query: "agent"
    description: "Agent owning this hypothesis"
    references_query: "hypotheses"
    references_description: "Hypotheses generated by this agent"
  )
  """Testable statement, e.g. 'tf2.incidents.severity has exactly 3 distinct values'"""
  content:         String!
  """What category the fact would be if confirmed (schema, field_values, etc.)"""
  category:        String
  """Lifecycle: proposed|checking|confirmed|rejected|expired"""
  status:          String  @default(value: "proposed")
  """Verification priority: high|medium|low"""
  priority:        String  @default(value: "medium")
  """Human-readable steps for the verification agent"""
  verification:    String
  """Expected number of tool calls to verify"""
  estimated_calls: Int     @default(value: "3")
  """Session that spawned this hypothesis"""
  source_session_id: String @field_source(field: "source_session") @field_references(
    references_name: "sessions"
    field: "id"
    query: "source_session"
    description: "Session where this hypothesis was identified"
    references_query: "hypotheses"
    references_description: "Hypotheses that originated from this session"
  )
