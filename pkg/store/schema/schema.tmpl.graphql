# Agent Storage — Hugr SDL (Go template)
#
# Template params (query-engine common convention — hugrapp.TemplateParams):
#   .VectorSize   int    — embedding dimension (0 = no embeddings)
#   .EmbedderName string — hugr data source name for the embedder
#
# Template functions (query-engine/pkg/db/sql_template.go):
#   isPostgres() — PostgreSQL backend (⟹ TimescaleDB hypertables + pgvector)
#   isDuckDB()   — DuckDB backend
#
# Data source: Name="hub.agent.db", AsModule=true
# The source name provides the `.agent.db` nesting — there is NO @module
# directive on any type; every type sits directly under the source.
# IDs generated by Go (synthetic sortable, not DB-generated).
#
# GraphQL path: { hub { agent { db { ... } } } }

# ============================================================
# Version — schema + embedder identity pins
# ============================================================

"""Internal pin table — schema version + embedder model identity written at provisioning time (spec 006 §5d). Queried at startup to enforce the "embedder model cannot change under existing vectors" invariant."""
type version @table(name: "version") {
  """Pin key: 'schema' | 'embedder_model' | 'embedding_model' (legacy) | 'embedding_dim'"""
  name:    String! @pk
  """Pinned value for the key (schema version, model name, dim)"""
  version: String!
}

# ============================================================
# Agent types — configuration templates for agent behavior
# ============================================================

"""Agent type defines a reusable configuration template: constitution, skills, LLM routes, memory rules. Multiple agent instances can share the same type."""
type agent_types @table(name: "agent_types") {
  """Unique identifier, e.g. 'hugr-data-agent'"""
  id:            String! @pk
  """Human-readable name"""
  name:          String!
  """What this agent type does"""
  description:   String
  """Full configuration: {constitution, skills, llm, memory, embedding}"""
  config:        JSON
  """When this type was created"""
  created_at:    Timestamp @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "objects.created_at")
  """When configuration was last changed"""
  updated_at:    Timestamp @default(update_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}")
  """Soft delete timestamp"""
  deleted_at:    Timestamp
}

# ============================================================
# Agents — running instances of an agent type
# ============================================================

"""An agent instance — one running process or logical identity. Standalone: one row. Hub: one per deployment."""
type agents @table(name: "agents") {
  """Synthetic ID: agt_{short_id}"""
  id:              String! @pk
  """Configuration template for this agent"""
  agent_type_id:   String! @field_references(
    references_name: "agent_types"
    field: "id"
    query: "agent_type"
    description: "Configuration template for this agent"
    references_query: "agents"
    references_description: "Agent instances using this type"
  )
  """Short 4-char alias used in synthetic ID generation (e.g. 'ag01')"""
  short_id:        String!
  """Human-readable agent name"""
  name:            String!
  """Lifecycle: active | paused | archived"""
  status:          String  @default(value: "active")
  """Per-instance config overrides (merged on top of agent_type.config)"""
  config_override: JSON
  """When this agent was registered"""
  created_at:      Timestamp @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "objects.created_at")
  """Last time this agent processed a request"""
  last_active:     Timestamp @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}")
  """Soft delete timestamp"""
  deleted_at:      Timestamp
}

# ============================================================
# Sessions — agent conversation sessions (including sub-agents)
# ============================================================

"""A conversation session — one thread of interaction. Root sessions are user-initiated. Sub-agent sessions have parent_session_id set. Team agents support multiple participants in one session."""
type sessions @table(name: "sessions") {
  """ADK session ID (= A2A Task ID)"""
  id:                String! @pk
  """Agent running this session"""
  agent_id:          String! @field_references(
    references_name: "agents"
    field: "id"
    query: "agent"
    description: "Agent running this session"
    references_query: "sessions"
    references_description: "Conversation sessions for this agent"
  )
  """Session owner (OIDC subject who started it). For team agents: the user who initiated."""
  owner_id:          String
  """NULL = root session. Set for forks (inherit history) and sub-agents (own context)"""
  parent_session_id: String  @field_references(
    references_name: "sessions"
    field: "id"
    query: "parent_session"
    description: "Parent session — for forks (shared history) or sub-agents (separate context)"
    references_query: "child_sessions"
    references_description: "Forked or sub-agent sessions derived from this session"
  )
  """For forked sessions: inherit parent events up to this seq number. NULL = sub-agent (own context, no inherited history)."""
  fork_after_seq:    Int
  """Discriminator: 'root' (user-initiated), 'subagent' (agent-spawned, isolated context), 'fork' (reserved for future user-initiated forks). Runtime branches on this column, NOT on parent_session_id presence."""
  session_type:      String! @default(value: "root")
  """For sub-agents: id of the session_events row on the parent that carried the dispatch tool_call. NULL for root sessions."""
  spawned_from_event_id: String @field_references(
    references_name: "session_events"
    field: "id"
    query: "spawn_event"
    description: "Event on the parent session that spawned this sub-agent (NULL for root sessions)"
    references_query: "spawned_sessions"
    references_description: "Sub-agent sessions spawned from this event"
  )
  """Lifecycle: active|completed|abandoned|failed"""
  status:            String  @default(value: "active")
  """Sub-agent: task description. Fork: NULL or user's question"""
  mission:           String
  """Flexible metadata: {model, total_tokens, skill_loaded, topology, ...}"""
  metadata:          JSON
  """Session start time"""
  created_at:        Timestamp @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "objects.created_at")
  """Last activity"""
  updated_at:        Timestamp @default(update_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}")
}

# ============================================================
# Session events — full conversation transcript (append-only)
# ============================================================

"""One event in a session: user message, agent response, tool call/result, sub-agent spawn/result, system event. Append-only — this IS the transcript for post-session review. Eligible event types carry a semantic embedding (populated server-side via Hugr's `summary:` mutation parameter)."""
type session_events @table(name: "session_events")
  {{ if gt .VectorSize 0 }}@embeddings(model: "{{ .EmbedderName }}", vector: "embedding", distance: Cosine){{ end }}
  {{ if isPostgres }}@hypertable{{ end }} {
  """Synthetic sortable ID: evt_{agent}_{ts}_{rnd}"""
  id:          String! @pk
  """Session this event belongs to"""
  session_id:  String! @field_references(
    references_name: "sessions"
    field: "id"
    query: "session"
    description: "Session containing this event"
    references_query: "events"
    references_description: "Transcript events in this session"
  )
  """Agent that produced this event"""
  agent_id:    String!
  """Event order within session (monotonically increasing)"""
  seq:         Int!
  """Event type: user_message|agent_message|tool_call|tool_result|agent_spawn|agent_result|agent_abstained|summary|system"""
  event_type:  String!
  """Who authored: user_id for human messages, 'agent' for agent, 'tool' for tool results, 'system' for system events. In team sessions: specific user_id identifies which participant spoke"""
  author:      String!
  """Text content of the event"""
  content:     String
  """Tool name (for tool_call / tool_result events)"""
  tool_name:   String
  """Tool call arguments as JSON"""
  tool_args:   JSON
  """Tool result text (may be large)"""
  tool_result: String
  """Flexible metadata: {channel, intent, tokens, model, duration_ms, child_session_id, reason, ...}"""
  metadata:    JSON
  """When this event occurred"""
  created_at:  Timestamp {{ if isPostgres }}@pk @timescale_key{{ end }} @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "objects.created_at")
  {{ if gt .VectorSize 0 }}
  """Semantic embedding of content. NULL for lifecycle events / oversize / transient embedder failures. Populated atomically with insert via the `summary:` mutation parameter."""
  embedding:   Vector @dim(len: {{ .VectorSize }})
  {{ end }}
}

# ============================================================
# Session notes — per-root-session working notepad (phase 4.2.3)
# ============================================================
#
# Hypotheses-not-facts scratchpad shared across all missions inside
# one root conversation. Append-only — runtime never UPDATEs;
# `notepad:append` writes; old notes fall out of model visibility
# via a configurable read window (default 48h) rather than being
# deleted. Storage location is always the root session of the
# parent chain — the extension climbs `RootAncestor()` before
# writing.

"""Per-root-session working notepad — hypotheses recorded by the LLM mid-conversation. Append-only (no UPDATEs, no soft delete). Storage column session_id is always the root of the parent chain; author_session_id carries the actual writing session for audit. Eligible rows carry a semantic embedding populated server-side via Hugr's `summary:` mutation parameter."""
type session_notes @table(name: "session_notes")
  {{ if gt .VectorSize 0 }}@embeddings(model: "{{ .EmbedderName }}", vector: "embedding", distance: Cosine){{ end }} {
  """Synthetic sortable ID: note_{agent}_{ts}_{rnd}"""
  id:          String! @pk
  """Agent that saved this note"""
  agent_id:    String! @field_references(
    references_name: "agents"
    field: "id"
    query: "agent"
    description: "Agent that saved this note"
    references_query: "session_notes"
    references_description: "Session notes saved by this agent"
  )
  """Storage location — always the ROOT of the writing session's parent chain. Phase 4.2.3 extension climbs `RootAncestor()` before insert so every session in the tree sees the same notepad via `session_id == root.id`."""
  session_id:  String! @field_references(
    references_name: "sessions"
    field: "id"
    query: "session"
    description: "Root session the note is stored under"
    references_query: "notes"
    references_description: "Notes stored at this root session"
  )
  """Authoring session — may differ from session_id when a sub-agent's notepad:append climbs to root. Audit trail; never used for visibility filtering."""
  author_session_id: String @field_references(
    references_name: "sessions"
    field: "id"
    query: "author_session"
    description: "Session that wrote this note"
    references_query: "authored_notes"
    references_description: "Notes authored by this session (stored under its root)"
  )
  """Open-string filtering tag, model-supplied at notepad:append time. Skill's `mission.on_start.notepad.tags` may advertise recommended values; runtime accepts any string."""
  category:    String
  """Tier of the authoring session at write time: `agent` (root, depth 0), `coordinator` (mission, depth 1), `worker` (depth >= 2). Set by runtime from author's tier."""
  author_role: String
  """Model-supplied short context phrase — "what does the writing session think it is working on right now". Optional; empty acceptable. Independent of sessions.mission (which is the formal spawn goal set by runtime at spawn_mission)."""
  mission:     String
  """Note text — concise, self-contained hypothesis. Treat as observation under uncertainty (phase 7 distillation validates)."""
  content:     String!
  """When this note was saved"""
  created_at:  Timestamp @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "objects.created_at")
  {{ if gt .VectorSize 0 }}
  """Semantic embedding of content. NULL for transient embedder failures. Populated atomically with insert via the `summary:` mutation parameter — the runtime passes the note content as the summary string."""
  embedding:   Vector @dim(len: {{ .VectorSize }})
  {{ end }}
}

# ============================================================
# Tool policies (spec 009 / phase 4) — persistent overrides for the
# default approval behavior of a tool. Hot-cached by *PolicyStore in
# pkg/approvals; reads are lock-free via atomic.Pointer[snapshot].
# Resolution chain: role exact > role prefix > skill exact > skill
# prefix > global exact > global prefix > frontmatter rules >
# hardcoded default.
# ============================================================

"""Persistent policy override for a tool, scoped global / skill / role. Hot-cached by *PolicyStore."""
type tool_policies @table(name: "tool_policies") {
  """Owning agent"""
  agent_id:    String! @pk @field_references(
    references_name: "agents"
    field: "id"
    query: "agent"
    description: "Agent that owns this policy"
    references_query: "tool_policies"
    references_description: "Tool policies for this agent"
  )
  """Exact tool name OR prefix glob (e.g. "data-*")"""
  tool_name:   String! @pk
  """Scope: global | skill:<name> | role:<skill>:<role>"""
  scope:       String! @pk
  """Decision: always_allowed | manual_required | denied"""
  policy:      String!
  """Free-form annotation captured at policy_set time"""
  note:        String
  """Authorship: user | llm | system"""
  created_by:  String!
  """Created at timestamp"""
  created_at:  Timestamp @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "objects.created_at")
  """Updated at timestamp; advances on every upsert"""
  updated_at:  Timestamp @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}")
}

# ============================================================
# Tasks (Phase 6) — user-defined schedule entries.
#
# Lifecycle UPDATEs only (pause / resume / cancel / spec edit) —
# 0-2 writes per task lifetime, never per fire. The schedule
# anchor (next planned fire) lives in `task_log` as a `planned`
# row inserted at OpenTask (fire_seq=1) and at the end of every
# fire (fire_seq=N+1). See phase-6-spec.md §2 for the full
# update-minimisation contract.
# ============================================================

"""A scheduled task owned by a session. Created via the `task:create` tool from the TaskManager extension. Each fire emits append-only rows into `task_log`; the next planned fire is reachable via `task.log(filter: {event_type: {eq: "planned"}}, nested_order_by: [{field: "fire_seq", direction: DESC}], nested_limit: 1)`. Use `nested_order_by` / `nested_limit` on relation subqueries — plain `order_by` / `limit` apply BEFORE the join (global) and silently null-out per-parent semantics."""
type tasks @table(name: "tasks") {
  """Synthetic sortable id: tsk_{agent}_{ts}_{rnd}"""
  id:               String! @pk
  """Agent that owns this task"""
  agent_id:         String! @field_references(
    references_name: "agents"
    field: "id"
    query: "agent"
    description: "Agent that owns this task"
    references_query: "tasks"
    references_description: "Tasks owned by this agent"
  )
  """Fire delivery kind: 'wake' (UserMessage into owner session) | 'spawn' (new cron session)"""
  kind:             String!
  """Lifecycle: 'active' | 'paused' | 'cancelled' | 'completed'. The only column on this row that mutates after insert (plus paired pause_reason and rare spec edits) — never UPDATEd per fire."""
  status:           String! @default(value: "active")
  """Schedule shape: 'once_in' | 'once_at' | 'cron' | 'interval'"""
  schedule_kind:    String!
  """Session that created (and OWNS) this task. Notifications route here. Task is visible only to this session's TaskManager extension."""
  owner_session_id: String! @field_references(
    references_name: "sessions"
    field: "id"
    query: "owner_session"
    description: "Session that owns this task"
    references_query: "owned_tasks"
    references_description: "Tasks owned by this session"
  )
  """Skill name to load on each fire (spawn kind). NULL for wake kind."""
  skill_ref:        String
  """Typed configuration body — projected from the JSON column."""
  spec:             JSON!
  """When paused: 'user' | 'skill_changed' | 'schema_changed' | 'render_failed' | 'owner_terminated'. NULL while active. Written atomically with status='paused'."""
  pause_reason:     String
  """Created at"""
  created_at:       Timestamp @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "objects.created_at")
  """Last lifecycle change (pause / resume / cancel / spec edit). Quiet across fires — only moves on operator action."""
  updated_at:       Timestamp @default(update_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}")
}

# ============================================================
# Task log (Phase 6) — append-only event log per fire.
#
# Every scheduler fire emits >= 2 rows (planned then terminal
# completed/failed), plus optional started/log rows in between.
# NO UPDATEs ever. `fire_seq` + `planned_at` are denormalised
# onto every row so latest-by-fire queries don't need joins.
# Symmetric with `session_events`. Hypertable on Timescale.
# ============================================================

"""Append-only event log: every scheduler fire emits >= 2 rows (planned -> completed|failed), plus optional started/log rows in between. NO UPDATEs ever. `fire_seq` + `planned_at` are denormalised onto every row so latest-by-fire queries skip joins. Symmetric with `session_events`."""
type task_log @table(name: "task_log")
  {{ if isPostgres }}@hypertable{{ end }} {
  """Synthetic sortable id: tlog_{task}_{ts}_{rnd}"""
  id:           String! {{ if not (isPostgres) }}@pk{{ end }}
  """Task this row belongs to"""
  task_id:      String! @field_references(
    references_name: "tasks"
    field: "id"
    query: "task"
    description: "Task this log row belongs to"
    references_query: "log"
    references_description: "Append-only event log for this task"
  )
  """Agent owning the task"""
  agent_id:     String! @field_references(
    references_name: "agents"
    field: "id"
    query: "agent"
    description: "Agent that owns the task"
  )
  """Per-task 1-indexed fire counter; identifies the fire this row belongs to. Denormalised on EVERY row of the fire so latest-by-fire queries skip joins."""
  fire_seq:     Int!
  """Event kind: 'planned' (Runner scheduled this fire) | 'started' (fire dispatch began) | 'log' (mid-fire progress note; free-form content) | 'completed' | 'failed' | 'skipped' | 'cancelled'."""
  event_type:   String!
  """Planned fire instant. On 'planned' rows it's the schedule output; on follow-up rows of the same fire it matches the parent 'planned' row's value."""
  planned_at:   Timestamp!
  """Spawned cron session id (for spawn kind). Set on 'started' and later rows. NULL for wake kind and for 'planned' rows."""
  session_id:   String @field_references(
    references_name: "sessions"
    field: "id"
    query: "session"
    description: "Cron session that ran this fire"
    references_query: "task_log"
    references_description: "Task log rows for this session"
  )
  """Outcome blob on terminal events ('completed' / 'failed' / 'skipped' / 'cancelled'). NULL on 'planned' / 'started' / 'log'."""
  outcome:      JSON
  """Free-form text body for event_type='log' (mid-fire progress note). NULL otherwise."""
  content:      String
  """When this row was written. Timescale time key. Combined with fire_seq DESC for latest-event queries."""
  created_at:   Timestamp {{ if isPostgres }}@pk @timescale_key{{ end }} @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "objects.created_at")
}

# ============================================================
# Dynamic skills (Phase 6.2.db) — DB-backed skill source: on-disk
# bundle + DB index for semantic discovery, usage ranking, and
# package management. `description` is embedded server-side via the
# @embeddings directive (same infra as session_notes). The raw
# skills / skill_log / skill_links GraphQL surface is runtime-internal
# — the 3-tier permission layer gates it so the model reaches skills
# only through the `skill:*` tools.
# ============================================================

"""One index row per dynamic-skill bundle (task / recipe / catalog / …). DB = discovery/index, disk = content. `metadata` carries the full metadata.hugen projection so mission roles + task inputs_schema are served WITHOUT a SKILL.md read; the filter columns (type / task_eligible / task_kind / keywords / tier_compat / has_inputs_schema) are denormalised from it for cheap structural WHERE before the semantic rank. `source` is the reapability / provenance anchor; `pin` always-advertises (bypasses the discovery bandit). `description` is vectorised server-side into description_vec for semantic discovery."""
type skills @table(name: "skills")
  {{ if gt .VectorSize 0 }}@embeddings(model: "{{ .EmbedderName }}", vector: "description_vec", distance: Cosine){{ end }} {
  """Stable synthetic id: skl-{hex}. Immutable across version updates and renames — every FK (skill_links.source/target_id, skill_log.skill_id) points here."""
  id:                String! @pk
  """Agent that owns this skill (scope slice)"""
  agent_id:          String! @field_references(
    references_name: "agents"
    field: "id"
    query: "agent"
    description: "Agent owning this dynamic skill"
    references_query: "skills"
    references_description: "Dynamic skills owned by this agent"
  )
  """Forward-compat (db-3): cross-agent visibility. Column present now; sharing LOGIC lands in hub mode."""
  shared:            Boolean! @default(value: "false")
  """Human handle used by skill:load / task:<name> / schedule_ref. Unique within (agent_id, source); may be renamed (id stays)."""
  name:              String!
  """Coarse class: 'task' | 'recipe' | 'catalog' | 'skill' | …"""
  type:              String! @default(value: "skill")
  """Self-contained description — embedded into description_vec for semantic discovery"""
  description:       String
  """Denormalised from metadata: whether this skill is a runnable task/recipe (synthetic task:<name> tool eligible)"""
  task_eligible:     Boolean! @default(value: "false")
  """Denormalised from metadata: 'worker' | 'mission' (task spawn tier). NULL for non-task skills."""
  task_kind:         String
  """Denormalised from metadata.mission.keywords — keyword discovery prefilter"""
  keywords:          [String!]
  """Denormalised from metadata: tier_compatibility set (agent | mission | worker)"""
  tier_compat:       [String!]
  """Denormalised from metadata: whether the task block carries an inputs_schema"""
  has_inputs_schema: Boolean! @default(value: "false")
  """FULL metadata.hugen projection (mission block + task block + sub_agents + inputs_schema + …). Served straight from the DB so the synthetic task:<name> tool build + mission roles need no SKILL.md read; disk is read only for actual content."""
  metadata:          JSON!
  """Always-advertise marker — bypasses the discovery bandit (operator / config force-keep)"""
  pin:               Boolean! @default(value: "false")
  """REQUIRED origin enum. Locally-generated (reapable): 'authored' (skill:save / _task_builder), 'memory' (Phase-7 distilled). Installed (never auto-reaped): 'hub' | 'catalogue' | 'file'."""
  source:            String!
  """Declared bundle version (human-facing pin)"""
  version:           String
  """Hash of the bundle — update-at-start change signal"""
  content_hash:      String
  """Link to the on-disk bundle directory"""
  bundle_path:       String
  """Authoring identity (user / session / 'memory')"""
  owner:             String
  """When this row was first created"""
  created_at:        Timestamp @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "objects.created_at")
  """Last update (install / update-at-start / config-set). Bounded — never per-fire."""
  updated_at:        Timestamp @default(update_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}")
  """When this skill was installed (NULL for create-path authored skills until first install)"""
  installed_at:      Timestamp
  {{ if gt .VectorSize 0 }}
  """Vector embedding of `description` for semantic discovery. Populated atomically with insert/update via the `summary:` mutation parameter."""
  description_vec:   Vector @dim(len: {{ .VectorSize }})
  {{ end }}
}

"""Append-only usage telemetry for dynamic skills. `event` ∈ {shown, loaded, used}: `shown` is the impression (advertised / surfaced in a search result), `loaded` / `used` are the rewards. No mutable counters on the hot path — bandit P(success) ≈ load_count/show_count rolls up off-line (db-2). Mirrors task_log."""
type skill_log @table(name: "skill_log") {
  """Synthetic id: slog-{hex}"""
  id:         String! @pk
  """Skill this event applies to"""
  skill_id:   String! @field_references(
    references_name: "skills"
    field: "id"
    query: "skill"
    description: "Skill this event applies to"
    references_query: "log"
    references_description: "Append-only usage log for this skill"
  )
  """Agent that produced the event (bandit signal stays per-agent even when content is shared)"""
  agent_id:   String! @field_references(
    references_name: "agents"
    field: "id"
    query: "agent"
    description: "Agent that produced this event"
  )
  """Event kind: 'shown' (impression) | 'loaded' | 'used' (rewards)"""
  event:      String!
  """Session in which the event occurred (NULL for background sweeps)"""
  session_id: String
  """Optional event detail blob {query, rank, …}"""
  details:    JSON
  """When the event was recorded"""
  created_at: Timestamp @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "objects.created_at")
}

"""Directed edge between two dynamic skills. Plain junction (NOT a tagged is_m2m table, so the junction stays addressable for visibility control); the relation surfaces on `skills` via the outgoing_links / incoming_links subqueries through this table. A task may have 0 / 1 / many catalogs — `catalog_member` carries that membership."""
type skill_links @table(name: "skill_links") {
  """Agent scope slice"""
  agent_id:   String! @pk
  """Skill this edge originates from (e.g. the catalog)"""
  source_id:  String! @pk @field_references(
    references_name: "skills"
    field: "id"
    query: "source"
    description: "Origin skill of this edge"
    references_query: "outgoing_links"
    references_description: "Edges from this skill to other skills"
  )
  """Skill this edge points to (e.g. a catalog member task)"""
  target_id:  String! @pk @field_references(
    references_name: "skills"
    field: "id"
    query: "target"
    description: "Destination skill of this edge"
    references_query: "incoming_links"
    references_description: "Edges from other skills pointing to this skill"
  )
  """Edge type: 'catalog_member' | 'autoload' | 'requires' | 'related' | …"""
  relation:   String! @pk
  """When this edge was created"""
  created_at: Timestamp @default(insert_exp: "{{ if isPostgres }}NOW(){{ else }}CURRENT_TIMESTAMP{{ end }}", update_exp: "objects.created_at")
}

