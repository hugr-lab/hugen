# hugen configuration example.
# Copy to config.yaml and adjust to your environment.
# Secrets live in .env (referenced via ${VAR} below).

# ── Agent identity ──────────────────────────────────────────
agent:
  id: agt_ag01           # full agent ID (used in logs, events, IDs)
  short_id: ag01         # 4-char alias embedded in synthetic entity IDs
  name: hugen
  type: hugen-default

# ── Listener bindings ───────────────────────────────────────
# Port + base URL for the A2A endpoint (agent card + /invoke + OIDC
# callback). Must be reachable from A2A clients.
a2a:
  port: 10000
  base_url: http://localhost:10000

# Loopback-only developer UI (webui mode).
devui:
  port: 10001
  base_url: http://localhost:10001

# ── LLM ─────────────────────────────────────────────────────
# Hugr data source name + per-call defaults. The Hugr instance pointed
# at by HUGR_URL is responsible for routing this name to a real provider.
models:
  # Top-level "default" model. The runtime treats this as the
  # IntentDefault entry; explicit "default" inside routes overrides it.
  model: gemma4-26b
  max_tokens: 8192
  temperature: 0.4
  routes:
    # Required by phase-1 ModelRouter — the "cheap" intent slot is
    # reserved for the Compactor (phase 5) and Reviewer (phase 7);
    # phase 1 only validates that it exists at boot.
    cheap:
      model: gemma-small
      max_tokens: 2048
      temperature: 0.0
    # Optional named routes for specific use cases.
    reasoning:
      model: gemini-pro-3-1
      max_tokens: 8192
      temperature: 0.2
    creative:
      model: claude-sonnet
      max_tokens: 8192
      temperature: 0.8


# ── Auth providers ──────────────────────────────────────────
# The hugr connection uses the .env-driven primary source by default.
# Add more named entries here only when you wire additional providers
# (e.g. external MCP servers). Primary hugr auth is configured via .env.
#
# auth:
#   - name: hugr
#     type: hugr
#     access_token: ${HUGR_ACCESS_TOKEN}
#     token_url: ${HUGR_TOKEN_URL}
#   - name: keycloak
#     type: oidc
#     issuer: ${HUGR_OIDC_ISSUER}
#     client_id: ${HUGR_OIDC_CLIENT_ID}

# ── Tool providers (phase 3) ────────────────────────────────
# MCP catalogue. Each entry becomes a `*tool.MCPProvider` registered
# with the ToolManager. Keys:
#   name        — provider id used as the tool prefix and permission
#                 type (e.g. `hugen:tool:hugr-main`).
#   type        — currently only `mcp`.
#   transport   — `stdio` (subprocess) | `http` (streamable-HTTP) | `sse`.
#   command/args/env — for `stdio` transports.
#   endpoint    — for `http` / `sse` transports (URL of the MCP server).
#   auth        — name of an `auth:` source above. Bearer tokens flow in
#                 via `auth.Transport(...)` per request.
#   lifetime    — `per_agent` (one process-wide connection — default for
#                 HTTP) or `per_session` (spawned per Session.Open —
#                 default for stdio; bash-mcp pattern).
#
# Hugr is OPTIONAL: omit the `hugr-main` / `hugr-query` / `python-mcp`
# entries to run a universal local agent without Hugr. The analyst
# providers `duckdb-mcp` / `python-mcp` are likewise OPTIONAL — drop
# either or both to fall back to the phase-3 baseline (bash-mcp +
# system tools only). Skills that grant tools from a missing provider
# are flagged unavailable rather than rejected.
#
tool_providers:
  # In-tree per-session bash + filesystem MCP. Spawned by the
  # runtime on Session.Open with
  # cmd.Dir = <HUGEN_WORKSPACE_DIR>/<session_id>/.
  #
  # bash-mcp does no path translation. It exposes:
  #   - bash.run / bash.shell — exec on the host filesystem.
  #   - bash.read_file / write_file / list_dir / sed — convenience
  #     wrappers that canonicalise paths but otherwise operate on
  #     real host paths.
  #
  # Sandboxing is the deployment's job:
  #   - container: rely on the kernel + bind mounts.
  #   - local/dev: rely on filesystem ACL + (phase 5+) HITL
  #     approval prompts before destructive operations.
  - name: bash-mcp
    type: mcp
    transport: stdio
    command: ./bin/bash-mcp        # built by `make bash-mcp`
    lifetime: per_session
    env:
      # Real host directory the operator designates as the agent's
      # user-visible exchange folder. The model is told about it via
      # the _system skill and reads `$SHARED_DIR` in shell commands.
      # Leave blank / unset to disable.
      SHARED_DIR: ${HUGEN_SHARED_ROOT}

  # Remote Hugr MCP (HTTP). Hugr is itself an MCP server exposing
  # `discovery-*` / `schema-*` / `data-*` tools. The agent reaches
  # it through the named auth source. Drop this entry to run as a
  # universal local agent without Hugr.
  - name: hugr-main
    type: mcp
    transport: http
    endpoint: ${HUGR_URL}/mcp
    auth: hugr

  # In-tree Hugr GraphQL MCP (file output). Spawned per_agent over
  # stdio; persists tabular results as Parquet under each session's
  # workspace data dir, returns path + ≤ 50-row preview to the
  # model.
  #
  # `auth: hugr` flips on the loopback bootstrap injection — at
  # spawn time the runtime mints a per-spawn HUGR_ACCESS_TOKEN +
  # HUGR_TOKEN_URL pair the binary uses to keep its bearer fresh
  # against /api/auth/agent-token. WORKSPACES_ROOT below is the
  # operator-controlled parent of every session's data dir.
  #
  # HUGR_URL is the literal endpoint the binary dials — usually
  # `${HUGR_URL}/ipc` (multipart wire protocol). Operators behind a
  # proxy with a non-standard prefix put the full path here; the
  # runtime does NOT mangle it.
  #
  # Drop this entry to skip file-output queries; `hugr-main` above
  # still serves inline data tools.
  - name: hugr-query
    type: mcp
    transport: stdio
    command: ./bin/hugr-query        # built by `make hugr-query`
    lifetime: per_agent
    auth: hugr
    env:
      HUGR_URL: ${HUGR_URL}/ipc
      # WORKSPACES_ROOT is injected by the runtime — do not set it here.
      # The runtime points it at the same on-disk tree per_session
      # bash-mcp uses, so files written by hugr-query land where the
      # rest of the toolchain can find them.

  # In-tree Python MCP (per-session venv). Spawned per_agent over
  # stdio; lazily provisions each session's relocatable .venv from
  # the bundled template on first call. Tools: python.run_code (short
  # snippets) and python.run_script (file in the session workspace).
  #
  # `auth: hugr` injects the same loopback bootstrap as hugr-query —
  # Python scripts that import `hugr-client` reuse the agent's JWT
  # without seeing the operator's seed token. WORKSPACES_ROOT is the
  # parent of every session's `.venv` and `data/` dirs.
  #
  # The operator runs `python-mcp --create-template
  # ./assets/python/requirements.txt` once after building; the
  # resulting venv is referenced via --template below. uv ≥ 0.4.0
  # and Python ≥ 3.10 must be on the host. Drop this entry to run
  # without the analyst toolkit.
  - name: python-mcp
    type: mcp
    transport: stdio
    command: ./bin/python-mcp        # built by `make python-mcp`
    args: [--template, "${HUGEN_PYTHON_TEMPLATE}"]
    lifetime: per_agent
    auth: hugr
    env:
      HUGR_URL: ${HUGR_URL}/ipc
      # WORKSPACES_ROOT is injected by the runtime — same tree as
      # bash-mcp and hugr-query, so a script written by bash.write_file
      # is reachable by python.run_script in the same session.

  # Vendored MotherDuck MCP (DuckDB analytical SQL). Spawned per-session
  # via `uvx` against the pinned submodule under
  # `vendor/mcp-server-motherduck/`. Tools: execute_query / list_databases
  # / list_tables / list_columns. The connection is `:memory:` per
  # session — closes with the session, no on-disk DuckDB file.
  #
  # `--init-sql` is the operator's hardening hook: bound memory / threads,
  # pin spill + secret directories under the session workspace, and
  # pre-load the `spatial` and `httpfs` extensions so skills don't have
  # to (and the `duckdb-data` skill is forbidden from running per-call
  # `INSTALL` for either).
  #
  # `extension_directory` defaults to `~/.duckdb/extensions/` — the
  # first session pays the install cost (~10–30 s for spatial + httpfs);
  # subsequent sessions reuse the cache.
  #
  # No `auth:` — DuckDB SQL never reaches into Hugr; that's the
  # `hugr-main` / `hugr-query` job. Drop this entry to run without
  # analytical SQL on workspace files.
  - name: duckdb-mcp
    type: mcp
    transport: stdio
    command: uvx
    lifetime: per_session
    args:
      - --from
      - ./vendor/mcp-server-motherduck
      - mcp-server-motherduck
      - --db-path
      - ":memory:"
      - --read-write
      - --allow-switch-databases
      - --init-sql
      - |
        SET memory_limit     = '4GB';
        SET threads          = 4;
        SET temp_directory   = '.duckdb/tmp';
        SET secret_directory = '.duckdb/secrets';
        INSTALL spatial; LOAD spatial;
        INSTALL httpfs;  LOAD httpfs;

local_db_enabled: true
local_db:
  db:
    path: .data/engine.db
    settings:
      max_memory: 4
      worker_threads: 2
      home_directory: data
      timezone: UTC
  memory_path: .data/memory.db
  # LLM/embedding data sources registered at startup.
  # Path = full provider URL + query params. ${ENV_VAR} is expanded
  # from .env / shell env. Type: llm-openai | llm-anthropic |
  # llm-gemini | embedding.
  models:
    # LM Studio / OpenAI-compatible local LLMs
    - name: gemma4-26b
      type: llm-openai
      path: '${LLM_LOCAL_URL}?model="google/gemma-4-26b-a4b"&max_tokens=8096&thinking_budget=2048&timeout=10m'
    - name: gemma4-31b
      type: llm-openai
      path: '${LLM_LOCAL_URL}?model="google/gemma-4-31b"&max_tokens=8096&thinking_budget=2048&timeout=10m'
    - name: gpt-oss-20b
      type: llm-openai
      path: '${LLM_LOCAL_URL}?model="openai/gpt-oss-20b"&max_tokens=8096&thinking_budget=2048&timeout=10m'
    - name: gemma-small
      type: llm-openai
      path: '${LLM_LOCAL_URL}?model=gemma-4-e2b-it&timeout=120s'
    # Local embedding (LM Studio — OpenAI-compatible /v1/embeddings)
    - name: gemma-embedding
      type: embedding
      path: '${EMBED_LOCAL_URL}?model="text-embedding-embeddinggemma-300m-qat"&timeout=30s'
    # Cloud LLMs (fill ${*_API_KEY} in .env before using)
    - name: gemini-pro-3-1
      type: llm-gemini
      path: 'https://generativelanguage.googleapis.com/v1beta?model=gemini-3.1-pro-preview&api_key="${GEMINI_API_KEY}"&max_tokens=4096&thinking_budget=2048&timeout=120s'
    - name: claude-sonnet
      type: llm-anthropic
      path: 'https://api.anthropic.com/v1/messages?model=claude-sonnet-4-20250514&api_key="${ANTHROPIC_API_KEY}"&max_tokens=4096&thinking_budget=2048&timeout=60s'
    - name: chatgpt-5-4-mini
      type: llm-openai
      path: 'https://api.openai.com/v1/chat/completions?model="gpt-5.4-mini-2026-03-17"&api_key="${OPENAI_API_KEY}"&max_tokens=4096&thinking_budget=2048&timeout=120s'
    - name: gpt-5-4
      type: llm-openai
      path: 'https://api.openai.com/v1/chat/completions?model="gpt-5.4"&api_key="${OPENAI_API_KEY}"&max_tokens=4096&thinking_budget=2048&timeout=120s'
