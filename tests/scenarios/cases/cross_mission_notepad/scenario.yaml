# cross_mission_notepad — phase 4.2.3 δ acceptance gate.
#
# Two sequential analyst missions inside one root session. Mission
# A explores the `northwind.orders` schema; mission B answers a
# follow-up that depends on those discoveries. The cross-mission
# memory is persisted **via the ε on_close turn**, not by the
# model calling notepad:append in its main task — at session
# teardown the runtime fires one constrained model turn whose
# only allowed tool is notepad:append, with a narrow per-role
# prompt that asks "what's worth recording?".
#
# By-eye assertions (queries below):
#
#   1. After step 1 — ≥1 session_notes row exists under the root
#      written by a worker (`author_role = "worker"`, from
#      schema-explorer's close turn) AND/OR by the mission
#      (`author_role = "mission"`, from the analyst mission's
#      close turn). category="schema-finding" expected on at
#      least one. Content references something soft-delete /
#      deleted_at / column-related.
#
#   2. After step 1 — somewhere in the session tree
#      (mission OR worker, doesn't matter which exactly) a
#      `notepad:append` tool_call exists. This is the close-turn
#      surfacing — workers' main-task tool surfaces don't include
#      notepad write, but the close-turn narrows + opens it for
#      one constrained turn.
#
#   3. Step 2 — the new analyst mission's first system prompt
#      carried Block B (the runtime auto-rendered the notepad
#      snapshot before the mission's first turn). Asserted
#      indirectly: the step-2 mission either calls
#      `notepad:read` / `notepad:search` OR its workers'
#      queries reference the soft-delete column from step 1.
#
#   4. Step 2 — root's final answer is a count (a number) and
#      mentions either "deleted_at" / "soft-delete" / "active"
#      (case-insensitive), proving the schema knowledge flowed
#      end-to-end.
#
# requires: [hugr] — northwind orders table provided by the live
# Hugr instance the harness connects to.
name: cross_mission_notepad
requires: [hugr]

steps:
  # ──────────────────── Step 1 — schema discovery ────────────────────
  - say: |
      Please explore the `orders` table in the `northwind` data
      source. List its columns and, importantly, flag any
      non-obvious column semantics — soft-delete markers, status
      enums, foreign keys worth knowing about before we start
      running queries. A short structured summary is fine.
    # Single schema-explorer wave + analyst consolidation +
    # notepad:append + return-to-root. ~6-10 LLM turns at
    # 30-50s each on gemini-pro → 10-min budget.
    budget: 720s
    wait_for_subagents: 600s

    queries:
      # Notes written under this root after step 1. Expect ≥1
      # schema-finding row referencing soft-delete / deleted_at.
      # created_at MUST stay in selection (Hugr quirk: order_by
      # only sortable on projected fields).
      - name: notes_after_step1
        graphql: |
          query ($sid: String!) {
            hub { db { agent {
              session_notes(
                filter: {session_id: {eq: $sid}}
                order_by: [{field: "created_at", direction: ASC}]
              ) { id author_session_id author_role category mission content created_at }
            }}}
          }
        vars: { sid: "$sid" }

      # Mission tool_calls — must include notepad:append. Walks
      # every direct child of root (the mission session) and
      # projects its tool_call event names.
      - name: tool_calls_in_missions_step1
        graphql: |
          query ($sid: String!) {
            jq(query: ".hub.db.agent.sessions | map({mission_id: .id, tools: (.events // []) | map({seq, tool: .tool_name})})") {
              hub { db { agent {
                sessions(filter: {parent_session_id: {eq: $sid}}) {
                  id
                  events(filter: {event_type: {eq: "tool_call"}}, order_by: [{field: "seq", direction: ASC}]) {
                    seq tool_name
                  }
                }
              }}}
            }
          }
        vars: { sid: "$sid" }
        path: extensions.jq.jq

      # mission row — confirms exactly one mission spawned with
      # spawn_skill=analyst.
      - name: mission_row_step1
        graphql: |
          query ($sid: String!) {
            hub { db { agent {
              sessions(filter: {parent_session_id: {eq: $sid}}) {
                id status mission metadata
              }
            }}}
          }
        vars: { sid: "$sid" }

  # ──────────────────── Step 2 — query using prior knowledge ──────────
  - say: |
      Now give me a count of ACTIVE orders in `northwind.orders`.
      Reuse what we already learned about the schema; don't
      re-explore. Return one number plus a one-sentence
      explanation of how you handled the soft-delete (if any).
    # query-builder + data-analyst waves; mission consolidates a
    # number. ~8-12 turns → 12-min budget. Block B should already
    # carry the schema-finding from step 1, so the mission skips
    # schema-explorer entirely.
    budget: 720s
    wait_for_subagents: 600s

    queries:
      # Step-2 mission's tool_calls — should NOT include schema-
      # explorer spawn (Block B covers it) and SHOULD include
      # either notepad:read / notepad:search OR direct
      # spawn_wave with query-builder / data-analyst tasks that
      # already reference the soft-delete column.
      - name: tool_calls_in_missions_step2
        graphql: |
          query ($sid: String!) {
            jq(query: ".hub.db.agent.sessions | map({mission_id: .id, tools: (.events // []) | map({seq, tool: .tool_name})})") {
              hub { db { agent {
                sessions(filter: {parent_session_id: {eq: $sid}}) {
                  id
                  events(filter: {event_type: {eq: "tool_call"}}, order_by: [{field: "seq", direction: ASC}]) {
                    seq tool_name
                  }
                }
              }}}
            }
          }
        vars: { sid: "$sid" }
        path: extensions.jq.jq

      # Worker tasks the step-2 mission spawned — peek at their
      # task strings to verify the schema knowledge propagated
      # (a worker that references `deleted_at` IS NULL or
      # similar = cross-mission notepad worked).
      - name: worker_tasks_step2
        graphql: |
          query ($sid: String!) {
            jq(query: ".hub.db.agent.sessions | map({mission_id: .id, workers: (.child_sessions // []) | map({id, role: .metadata.spawn_role, task: .mission})})") {
              hub { db { agent {
                sessions(filter: {parent_session_id: {eq: $sid}}) {
                  id
                  child_sessions { id metadata mission }
                }
              }}}
            }
          }
        vars: { sid: "$sid" }
        path: extensions.jq.jq

      # Root's most recent assistant messages — the final answer
      # the user sees. We grep for "deleted_at" / "soft" /
      # "active" + a number to confirm schema knowledge flowed.
      - name: root_final_message_step2
        graphql: |
          query ($sid: String!) {
            jq(query: ".hub.db.agent.session_events | map({seq, content})") {
              hub { db { agent {
                session_events(
                  filter: {
                    session_id: {eq: $sid}
                    event_type: {eq: "agent_message"}
                  }
                  order_by: [{field: "seq", direction: DESC}]
                  limit: 3
                ) { seq content created_at }
              }}}
            }
          }
        vars: { sid: "$sid" }
        path: extensions.jq.jq

      # Final notes snapshot — proves append-only (no UPDATEs /
      # deletes happened across the two steps). Same row from
      # step 1 should still be present, possibly joined by extra
      # appends from step 2's mission if it recorded anything
      # new (e.g. query-pattern).
      - name: all_notes_final
        graphql: |
          query ($sid: String!) {
            hub { db { agent {
              session_notes(
                filter: {session_id: {eq: $sid}}
                order_by: [{field: "created_at", direction: ASC}]
              ) { id author_session_id author_role category content created_at }
            }}}
          }
        vars: { sid: "$sid" }
