# skill_discovery_via_catalog — saves a skill in this session with a
# distinctive description; verifies the discovery channel works in a
# FRESH session against the same memory.db (manual restart leg, same
# pattern as plan_survives_restart).
#
# This scenario writes; the by-eye verification is:
#
#   1. Run this scenario; note the .data/run-<ts>/<run>/state path.
#   2. Re-boot hugen against that state dir
#      (HUGEN_STATE=.data/<...>/state ./bin/hugen).
#   3. In the fresh root session, ask: "хочу probe-timestamp
#      report для path X" or similar — anything that should match
#      the saved skill's `description` field.
#   4. The model should:
#        a. NOT immediately compose a procedure from scratch.
#        b. Call skill:tools_catalog (with a pattern keyword
#           from the request).
#        c. Inspect available_in_skills, find `probe-skill-disco`.
#        d. Call skill:load probe-skill-disco.
#        e. Follow the saved procedure with the user's parameter.
#
# When the harness gains restart-aware step primitives this YAML
# grows automated checks (currently both legs of the test live in
# operator workflow).
name: skill_discovery_via_catalog
requires: []

steps:
  - say: |
      Write the current UTC timestamp to a temp file (parameter:
      output path, default to a tmp path). Then save the procedure
      as a skill called `probe-skill-disco` with a distinctive
      description like "diagnostic timestamp probe — writes UTC
      time to a file path argument". Validate it works.
    budget: 240s

    queries:
      # Confirm save happened with the distinctive description.
      - name: save_result
        graphql: |
          query ($sid: String!) {
            hub { db { agent {
              session_events(
                filter: {session_id: {eq: $sid}, event_type: {eq: "tool_result"}, tool_name: {eq: "skill:save"}}
                order_by: [{field: "seq", direction: ASC}]
              ) { seq tool_name tool_result }
            }}}
          }
        vars: { sid: "$sid" }

      # The skill should now be discoverable in this same session
      # via skill:tools_catalog — bash:run admits the saved skill
      # via available_in_skills.
      - name: catalog_after_save
        graphql: |
          query ($sid: String!) {
            jq(query: ".hub.db.agent.session_events | map(select(.tool_name == \"skill:tools_catalog\")) | last") {
              hub { db { agent {
                session_events(
                  filter: {session_id: {eq: $sid}, event_type: {eq: "tool_result"}, tool_name: {eq: "skill:tools_catalog"}}
                  order_by: [{field: "seq", direction: ASC}]
                ) { seq tool_name tool_result }
              }}}
            }
          }
        vars: { sid: "$sid" }
        path: extensions.jq.jq

  # Manual restart-leg verification:
  #
  # Re-boot hugen against the same state dir. In the fresh session,
  # type a message like "make a timestamp probe report for /tmp/x".
  # The agent should:
  #   - call skill:tools_catalog (any reasonable pattern keyword);
  #   - find probe-skill-disco in available_in_skills;
  #   - skill:load probe-skill-disco;
  #   - follow the saved procedure.
  #
  # The DuckDB query the operator runs to confirm in the fresh
  # session would be:
  #
  #   SELECT seq, tool_name, tool_args
  #   FROM hub.db.agent.session_events
  #   WHERE event_type = 'tool_call'
  #     AND tool_name IN ('skill:tools_catalog', 'skill:load')
  #   ORDER BY seq;
  #
  # Expected order in the fresh session:
  #   1. skill:tools_catalog (with `pattern` arg)
  #   2. skill:load name=probe-skill-disco
