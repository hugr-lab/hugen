# plan_survives_restart — write a plan + 2 comments, then end the
# scenario. The harness preserves memory.db on disk; the operator
# can re-run hugen against the same .data/run-<ts>/<run>/state/
# memory.db and verify plan:show returns the original body +
# comments (Recovery hook on the plan extension rebuilds
# projection from extension_frame events).
#
# v1 caveat: the harness does not yet automate the restart leg.
# This scenario writes the plan; the by-eye verification is:
#
#   1. Run this scenario; note the .data/run-<ts>/<run>/state path.
#   2. Open .data/<...>/state/memory.db with DuckDB:
#        SELECT * FROM hub.db.agent.session_events
#        WHERE event_type='extension_frame'
#          AND metadata.extension='plan';
#      Confirm one row with metadata.op='set' and two with
#      metadata.op='comment' are present.
#   3. (manual) Re-boot hugen against that state dir; type
#      `/skill load _planner` then ask "show me the plan" — the
#      response should include the body + comments from step 2.
#
# When the harness gains restart-aware step primitives (phase-4.1b
# follow-up), this YAML grows automated checks.
name: plan_survives_restart
requires: []

steps:
  - say: |
      Use the planner skill to draft a 3-step plan for analysing
      a hypothetical "monthly sales" report. Don't execute the
      steps. Add a one-line plan:comment for step 1 ("would query
      orders by month") and another for step 2 ("would join with
      customers"). Then plan:show so I can read it back.
    budget: 60s

    queries:
      # plan extension_frame events — plan rides KindExtensionFrame
      # with metadata.extension="plan" and the typed OpData
      # ({text, current_step}) under metadata.data. This is exactly
      # what Recovery will replay.
      - name: plan_ops
        graphql: |
          query ($sid: String!) {
            jq(query: ".hub.db.agent.session_events | map(select(.metadata.extension == \"plan\")) | map({seq, op: .metadata.op, current_step: .metadata.data.current_step, text: .metadata.data.text})") {
              hub { db { agent {
                session_events(
                  filter: {session_id: {eq: $sid}, event_type: {eq: "extension_frame"}}
                  order_by: [{field: "seq", direction: ASC}]
                ) { seq metadata }
              }}}
            }
          }
        vars: { sid: "$sid" }
        path: extensions.jq.jq
