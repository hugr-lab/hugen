# multi_root_independence — phase 5.1b merge gate.
#
# Two concurrent root sessions answer unrelated user prompts under
# one Manager. Demonstrates the phase-5.1 plumbing
# (responseRouting tables, pendingInquiry maps, async cap counters,
# liveview projection cache) is per-session and does NOT cross-
# contaminate between root trees.
#
# Harness flow (phase 5.1b δ):
#   1. Open `alice` and `bob` roots in parallel via the multi-root
#      harness primitive (Scenario.Roots).
#   2. Run each root's Steps concurrently in goroutines.
#   3. After both finish, run Assertions queries — they reference
#      `$sid_alice` / `$sid_bob` to inspect each root's persisted
#      state independently.
#
# By-eye assertions (assertion queries below dump the data, the
# reviewer eyeballs):
#
#   1. Both roots produced final agent_message frames on their
#      own event logs. No session-id cross-contamination.
#   2. alice's session_events contains no rows authored by bob's
#      session id, and vice versa.
#   3. Each root's session_status events follow its own lifecycle
#      independently (no interleaved state transitions across
#      roots).
#
# The scenario uses trivial knowledge prompts so the LLM resolves
# quickly without spawning missions — this keeps the per-root
# work bounded and the parallel execution observable in the run
# duration. (A multi-mission isolation test would add minutes
# per root, blocking the merge gate on Claude budget.)

name: multi_root_independence
requires: [hugr]

roots:
  alice:
    owner: alice
    steps:
      - say: |
          What is 2+2? Answer with just the number.
        budget: 60s
        queries:
          - name: alice_events
            graphql: |
              query ($sid: String!) {
                hub { db { agent {
                  session_events(
                    filter: {session_id: {eq: $sid}}
                    order_by: [{field: "seq", direction: ASC}]
                  ) { seq event_type tool_name }
                }}}
              }
            vars: { sid: "$sid" }
          - name: alice_final_messages
            graphql: |
              query ($sid: String!) {
                hub { db { agent {
                  session_events(
                    filter: {session_id: {eq: $sid}, event_type: {eq: "agent_message"}}
                    order_by: [{field: "seq", direction: DESC}]
                    limit: 1
                  ) { seq content }
                }}}
              }
            vars: { sid: "$sid" }

  bob:
    owner: bob
    steps:
      - say: |
          What is the capital of France? Answer with just the name.
        budget: 60s
        queries:
          - name: bob_events
            graphql: |
              query ($sid: String!) {
                hub { db { agent {
                  session_events(
                    filter: {session_id: {eq: $sid}}
                    order_by: [{field: "seq", direction: ASC}]
                  ) { seq event_type tool_name }
                }}}
              }
            vars: { sid: "$sid" }
          - name: bob_final_messages
            graphql: |
              query ($sid: String!) {
                hub { db { agent {
                  session_events(
                    filter: {session_id: {eq: $sid}, event_type: {eq: "agent_message"}}
                    order_by: [{field: "seq", direction: DESC}]
                    limit: 1
                  ) { seq content }
                }}}
              }
            vars: { sid: "$sid" }

# Cross-root assertions — single-shot after both roots completed.
# Each query references `$sid_alice` / `$sid_bob` to fetch each
# root's persisted state separately. Reviewer scans the dumps
# for session-id isolation.
assertions:
  - name: distinct_session_ids
    graphql: |
      query ($sid_alice: String!, $sid_bob: String!) {
        alice: hub { db { agent {
          sessions(filter: {id: {eq: $sid_alice}}) {
            id owner_id created_at
          }
        }}}
        bob: hub { db { agent {
          sessions(filter: {id: {eq: $sid_bob}}) {
            id owner_id created_at
          }
        }}}
      }
    vars: { sid_alice: "$sid_alice", sid_bob: "$sid_bob" }

  - name: alice_only_carries_alice_events
    graphql: |
      query ($sid_alice: String!, $sid_bob: String!) {
        hub { db { agent {
          session_events(
            filter: {session_id: {eq: $sid_alice}, event_type: {eq: "agent_message"}}
            order_by: [{field: "seq", direction: ASC}]
          ) { seq session_id content }
        }}}
      }
    vars: { sid_alice: "$sid_alice", sid_bob: "$sid_bob" }

  - name: bob_only_carries_bob_events
    graphql: |
      query ($sid_alice: String!, $sid_bob: String!) {
        hub { db { agent {
          session_events(
            filter: {session_id: {eq: $sid_bob}, event_type: {eq: "agent_message"}}
            order_by: [{field: "seq", direction: ASC}]
          ) { seq session_id content }
        }}}
      }
    vars: { sid_alice: "$sid_alice", sid_bob: "$sid_bob" }
