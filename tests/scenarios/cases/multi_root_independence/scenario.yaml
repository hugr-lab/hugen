# multi_root_independence — phase 5.1 cross-cutting invariant.
#
# Two concurrent root sessions answer interleaved user prompts.
# Verifies the phase-5.1 plumbing (responseRouting tables,
# pendingInquiry maps, async cap counters) is per-session and
# does NOT cross-contaminate between unrelated root trees.
#
# Today's scenario harness drives ONE root per scenario run. This
# scenario is a structural placeholder until the harness supports
# multi-root orchestration (separate Setup call per t.Run,
# concurrent OpenSession). The yaml below records the intended
# shape; the assertion machinery lands once the runner gains the
# fan-out.
#
# By-eye assertions (target):
#
#   1. Two open roots A and B run a non-trivial mission each.
#      Their session trees do not share any session id.
#
#   2. responseRouting maps and pendingInquiry maps on A's tree
#      never reach into B's tree (verified by emitting an
#      inquiry on A and observing B's transcript stays empty of
#      inquiry_response frames). Negative assertion — count
#      must be 0.
#
#   3. The per-root async cap counts only direct descendants of
#      THAT root. Filling A's children to the cap does not
#      affect B's spawn_mission(wait="async") on B.
#
#   4. The shared Manager.live map contains both roots; A is
#      not reachable as a descendant of B and vice versa.
#
# Tuning notes:
#   - The harness fan-out requirement is out of scope here.
#     Initial implementation can run the assertions as a Go
#     test under pkg/session/manager/, not under
#     tests/scenarios/. This yaml documents the user-facing
#     shape; the implementation may live elsewhere.
name: multi_root_independence
requires: [hugr]

steps:
  - say: |
      (Placeholder — multi-root scenario harness pending.) Run
      a simple data exploration on `northwind.customers`.
    budget: 240s
    wait_for_subagents: 180s

    queries:
      - name: tool_calls_root
        graphql: |
          query ($sid: String!) {
            hub { db { agent {
              session_events(
                filter: {session_id: {eq: $sid}, event_type: {eq: "tool_call"}}
                order_by: [{field: "seq", direction: ASC}]
              ) { seq tool_name tool_args }
            }}}
          }
        vars: { sid: "$sid" }
