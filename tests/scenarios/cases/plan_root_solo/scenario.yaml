# plan_root_solo — root drafts a plan, comments on each step as
# work proceeds, finishes with plan:show. By-eye: does the model
# drive plan:set first, then a sequence of plan:comment with
# current_step set correctly?
name: plan_root_solo
requires: []

steps:
  - say: |
      Use the planner skill to draft a 3-step plan for analysing
      the "northwind" data source: 1) discover entities, 2)
      pick one entity for deep-dive, 3) summarise findings. After
      each step, leave a one-line plan comment about what you'd
      do or learned. End by calling plan:show so I can read it.

      You don't need to actually execute the steps — just walk
      through the plan, leaving the trail of plan ops.
    budget: 90s

    queries:
      # plan extension_frame events — plan rides KindExtensionFrame
      # with metadata.extension="plan" and the typed OpData
      # ({text, current_step}) under metadata.data.
      - name: plan_ops
        graphql: |
          query ($sid: String!) {
            jq(query: ".hub.db.agent.session_events | map(select(.metadata.extension == \"plan\")) | map({seq, op: .metadata.op, current_step: .metadata.data.current_step, text: .metadata.data.text})") {
              hub { db { agent {
                session_events(
                  filter: {session_id: {eq: $sid}, event_type: {eq: "extension_frame"}}
                  order_by: [{field: "seq", direction: ASC}]
                ) { seq metadata }
              }}}
            }
          }
        vars: { sid: "$sid" }
        path: extensions.jq.jq

      # Tool calls — should be plan:* and (optionally) notepad: /
      # skill:tools_catalog. No data-source tools.
      - name: tool_calls_root
        graphql: |
          query ($sid: String!) {
            hub { db { agent {
              session_events(
                filter: {session_id: {eq: $sid}, event_type: {eq: "tool_call"}}
                order_by: [{field: "seq", direction: ASC}]
              ) { seq tool_name }
            }}}
          }
        vars: { sid: "$sid" }
