# skill_save_overwrite_collision — B54 tool-level collision gate.
# First save succeeds; a second save under the same name with
# `overwrite` OMITTED makes skill:save itself raise a clarification
# inquiry (overwrite / rename / cancel) — it does NOT return a bare
# error the model can paper over, and it NEVER silently clobbers. The
# harness answers `cancel`; the existing skill must be left untouched.
#
# By-eye / queries verify:
#   - First skill:save succeeded (tool_result without error).
#   - The second save raised a clarification inquiry_request whose
#     question names the collision (the TOOL asked — not the model in
#     free text).
#   - The harness answered `cancel`; the second skill:save tool_result
#     carries the cancellation (skill_save_cancelled), proving the
#     existing skill was NOT overwritten.
#   - The agent did NOT pre-emptively re-invoke skill:save with
#     overwrite=true on its own initiative.
#   - Agent's closing message reports the existing skill was kept /
#     not overwritten.
name: skill_save_overwrite_collision
requires: []

steps:
  - say: |
      Write the current UTC timestamp to a temp file. Then save the
      procedure as a skill called `collide-probe`.
    budget: 180s

    queries:
      # All tool_result rows from turn 1 — observer correlates by
      # seq adjacency to the preceding skill_save tool_call. The
      # store doesn't carry tool_name on tool_result rows.
      - name: turn1_tool_results
        graphql: |
          query ($sid: String!) {
            hub { db { agent {
              session_events(
                filter: {session_id: {eq: $sid}, event_type: {eq: "tool_result"}}
                order_by: [{field: "seq", direction: ASC}]
              ) { seq tool_result }
            }}}
          }
        vars: { sid: "$sid" }

  - say: |
      Save the SAME procedure under the SAME name `collide-probe`
      again — without specifying overwrite. I want to see what
      happens on a name collision.
    budget: 180s

    # B54 — the collision inquiry is raised by skill:save itself
    # (a clarification with overwrite / rename / cancel options).
    # Answer `cancel`: the existing skill must be preserved.
    inquiry_responses:
      - match:
          type: clarification
          question_contains: already exists
        respond:
          response: cancel
        delay: 200ms

    queries:
      # All tool_result rows in the session — the second save's
      # cancellation envelope (skill_save_cancelled) should appear
      # after the second skill_save tool_call. The store doesn't
      # carry tool_name on tool_result rows; observer correlates by
      # seq adjacency.
      - name: all_tool_results
        graphql: |
          query ($sid: String!) {
            hub { db { agent {
              session_events(
                filter: {session_id: {eq: $sid}, event_type: {eq: "tool_result"}}
                order_by: [{field: "seq", direction: ASC}]
              ) { seq tool_result }
            }}}
          }
        vars: { sid: "$sid" }

      # The collision inquiry skill:save raised — type clarification,
      # question naming the collision. Proves the TOOL asked, not the
      # model in free text.
      - name: collision_inquiry
        graphql: |
          query ($sid: String!) {
            hub { db { agent {
              session_events(
                filter: {root_session_id: {eq: $sid}, event_type: {eq: "inquiry_request"}}
                order_by: [{field: "seq", direction: ASC}]
              ) { seq session_id content metadata }
            }}}
          }
        vars: { sid: "$sid" }

      # Tool calls in the second turn — assert agent did NOT
      # invoke skill:save with overwrite=true on its own
      # initiative. (The tool's own gate handles the collision.)
      - name: tool_calls_second_turn
        graphql: |
          query ($sid: String!) {
            hub { db { agent {
              session_events(
                filter: {session_id: {eq: $sid}, event_type: {eq: "tool_call"}, tool_name: {eq: "skill_save"}}
                order_by: [{field: "seq", direction: ASC}]
              ) { seq tool_name tool_args }
            }}}
          }
        vars: { sid: "$sid" }

      # Final agent message of the turn — should report the existing
      # skill was kept / not overwritten.
      - name: final_agent_message
        graphql: |
          query ($sid: String!) {
            hub { db { agent {
              session_events(
                filter: {session_id: {eq: $sid}, event_type: {eq: "agent_message"}}
                order_by: [{field: "seq", direction: DESC}]
                limit: 1
              ) { seq content }
            }}}
          }
        vars: { sid: "$sid" }
