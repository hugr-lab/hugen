# Local Gemma4-26B via LM Studio on every tier. Requires
# LLM_LOCAL_URL in the harness's .test.env (e.g.
# http://host.docker.internal:1234/v1/chat/completions). Same
# `gemma4-26b` alias as configured in base config.yaml — resolves
# to LM Studio model id `google/gemma-4-26b-a4b`. Cheap route is
# the same model (gemma-small from earlier runs is unloaded as of
# 2026-05-12; mounting 26B on cheap keeps the router happy without
# falling back to an absent alias).
models:
  mode: local
  model: gemma4-26b
  max_tokens: 8192
  routes:
    cheap:
      mode: local
      model: gemma4-26b
      max_tokens: 8192
