# Hybrid: cloud Gemini-Pro 3.1 for root + mission tiers (smart
# routing without burning premium tokens on bulk reasoning), local
# Gemma4-26B via LM Studio for worker tier (token-heavy fanout work
# stays free). Phase 5.1 κ tuning iteration — gemma-small is
# unloaded from LM Studio, so cheap route can't fall back to a
# fast local model; mounting the 26B on workers keeps the API
# bill on a budget while root + mission get the cloud quality
# they need to drive delegation cleanly.
#
# Requires GEMINI_API_KEY + LLM_LOCAL_URL in the harness's
# .test.env.
models:
  mode: local
  model: gemini-pro-3-1
  max_tokens: 8192
  routes:
    cheap:
      mode: local
      model: gemma4-26b
      max_tokens: 8192
  tier_intents:
    worker: cheap
