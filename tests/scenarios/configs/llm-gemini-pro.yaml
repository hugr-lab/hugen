# Cloud Google Gemini Pro 3.1. Requires GEMINI_API_KEY in
# the harness's .test.env. Same max_tokens story as
# llm-claude-sonnet.yaml — provider URL pins thinking_budget so
# the cheap route's inherited 2048 from base.config.yaml fails
# the >budget check; we override explicitly.
models:
  mode: local
  model: gemini-pro-3-1
  max_tokens: 8192
  routes:
    cheap:
      mode: local
      model: gemini-pro-3-1
      max_tokens: 8192
