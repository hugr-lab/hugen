# Phase 4.1b — observational scenario harness orchestration.
#
# Each `runs:` entry boots one *runtime.Core (via runtime.Build,
# wrapped by tests/scenarios/harness/Setup). The agent-config the
# Core consumes is built per run by deep-merging the prod
# config.yaml with the listed `llm:` and `topology:` overlays
# (LLM picks the model route, topology picks the tool_providers
# set). All listed scenarios share that one Core; each gets its
# own root session.
#
# `requires:` gates the whole run on env-var availability — runs
# whose env is missing t.Skip cleanly instead of crashing.
#
# Knobs:
#  - go test -run TestScenarios/<run-name> ./tests/scenarios/...
#  - go test -run TestScenarios/<run-name>/<scenario-name> ...
runs:
  # Every v1 scenario expects skill:load("hugr-data") which surfaces
  # tools from hugr-main + hugr-query providers. Embedded topology
  # strips those — running an hugr-data scenario there leaves the
  # model hallucinating tools that aren't in the snapshot. Until
  # we add embedded-only scenarios (python_analysis only — pending
  # phase-4.2 analyst skills), every run uses external-hugr.

  - name: claude-sonnet
    llm: configs/llm-claude-sonnet.yaml
    topology: configs/topology-external-hugr.yaml
    requires: [anthropic, hugr]
    scenarios:
      - trivial_question_via_mission
      - root_refuses_load_data_skill
      - single_explorer
      - delegation_required
      - whiteboard_fanout3
      - full_analyst_workflow
      - skill_save_bundle
      - skill_save_overwrite_collision
      - skill_discovery_via_catalog
      # Phase 5.2 ι — parked-subagent acceptance scenarios.
      # Rely on the new bundled data-chat skill
      # (mission.autoclose:false). parked_idle_timeout +
      # parked_ceiling_drop require a topology overlay setting
      # short parking caps — wired in a fast-follow run.
      - parked_followup_chat
      - parked_dismiss_after_summary
      - restore_parked_replay
      # b3_per_role_budget_isolation installs the test-only
      # b3-fixture skill (tests/scenarios/fixtures/b3-fixture/).
      - b3_per_role_budget_isolation

  - name: gemini-pro
    llm: configs/llm-gemini-pro.yaml
    topology: configs/topology-external-hugr.yaml
    requires: [gemini, hugr]
    scenarios:
      # δ.B 3-tier scenarios — verify mission/worker pipeline.
      - trivial_question_via_mission
      - root_refuses_load_data_skill
      - single_explorer
      - delegation_required
      - whiteboard_fanout3
      - graphql_query_builder
      - full_analyst_workflow
      # η.2 — `_general` universal mission skill (catch-all fallback
      # for non-data work; root must dispatch via `_general`, not
      # `analyst`).
      - general_shell_lookup
      # Phase 5.1b δ — multi-root harness primitive. Two
      # concurrent roots with trivial prompts; isolates that
      # liveview / inquiry / async cap counters do not
      # cross-contaminate. Gemini-pro routes root + mission via
      # the cheap (gemma) intent — this run exercises the
      # mixed-tier path.
      - multi_root_independence
      # 4.2.3 δ — cross-mission notepad acceptance gate. Two
      # sequential user turns prove notes from mission A surface
      # to mission B via climb-to-root storage + the 48h window.
      - cross_mission_notepad
      # skill-machinery scenarios — independent of tier topology.
      - skill_save_bundle
      - skill_save_overwrite_collision
      - skill_discovery_via_catalog
      # Phase 5.2 ι — parked-subagent acceptance scenarios on
      # Gemini Pro. parked_idle_timeout / parked_ceiling_drop need
      # the park-fast / park-cap overlays (separate runs below).
      - parked_followup_chat
      - parked_dismiss_after_summary
      - restore_parked_replay
      - b3_per_role_budget_isolation
      # Retired in δ.B (legacy 2-tier patterns):
      # - three_parallel             — superseded by whiteboard_fanout3
      # - plan_root_solo             — root no longer owns plan:set/clear
      # - python_analysis_subagent   — covered by full_analyst_workflow's
      #                                data-analyst role
      # - hugr_data_explorer         — superseded by single_explorer
      # - plan_survives_restart      — restart with active plan; mission-
      #                                level rework deferred to η/phase-5

  - name: gpt-5-4
    llm: configs/llm-gpt-5-4.yaml
    topology: configs/topology-external-hugr.yaml
    requires: [openai, hugr]
    scenarios:
      - single_explorer
      - delegation_required
      - full_analyst_workflow
      - skill_save_bundle

  - name: gemma4-26b
    llm: configs/llm-gemma4-26b.yaml
    topology: configs/topology-external-hugr.yaml
    requires: [local, hugr]
    scenarios:
      # δ.B 3-tier core — anchor scenarios for the η Gemma gate.
      - trivial_question_via_mission
      - root_refuses_load_data_skill
      - single_explorer
      - delegation_required
      - whiteboard_fanout3
      - full_analyst_workflow
      # 4.2.3 δ — cross-mission notepad. Gemma 26B 7/10 gate per
      # phase-4.2.3 spec milestone δ. Sequential two-step;
      # validates that working memory survives spawn_mission
      # boundaries via climb-to-root storage.
      - cross_mission_notepad
      - skill_save_bundle
      - skill_save_overwrite_collision
      - skill_discovery_via_catalog
      # Phase 5.1 κ — HITL gate scenarios. Initial scaffolding;
      # harness wiring for InquiryRequest interception + multi-
      # root fan-out arrives in a fast-follow. Expect tuning
      # iterations against Gemma 26B before merge.
      - hitl_minimal
      - hitl_mission_probe
      - hitl_worker_probe
      - follow_up_during_mission
      - cancel_and_respawn
      - async_mission_completion
      - approval_gate_blocks_mutation
      - clarification_resolves_ambiguity
      - multi_root_independence
      # Phase 5.1c.async-root — root defaults to wait="async" +
      # announce-on-spawn. async_default_with_announce checks the
      # single-mission shape; parallel_async_missions checks the
      # two-missions-in-one-turn fan-out.
      - async_default_with_announce
      - parallel_async_missions
      # Phase 5.2 ι — parked-subagent acceptance scenarios on
      # Gemma. parked_idle_timeout / parked_ceiling_drop need a
      # short-timeout topology overlay; restore_parked_replay
      # exercises the η restore branch directly (deterministic
      # runtime path — model performance informational).
      - parked_followup_chat
      - parked_dismiss_after_summary
      - restore_parked_replay
      - b3_per_role_budget_isolation

  # Phase 5.2 ι — dedicated runs for the two parking scenarios
  # whose assertions depend on a non-default parking-config. The
  # claude-sonnet topology stays the source for tool_providers;
  # `overlays:` layers a tiny patch on top with the short
  # timeout / small cap. Mostly informational on weak models —
  # the deterministic ε path is covered by Go integration tests.
  - name: claude-sonnet-park-fast
    llm: configs/llm-claude-sonnet.yaml
    topology: configs/topology-external-hugr.yaml
    overlays: [configs/overlay-park-fast.yaml]
    requires: [anthropic, hugr]
    scenarios:
      - parked_idle_timeout

  - name: claude-sonnet-park-cap
    llm: configs/llm-claude-sonnet.yaml
    topology: configs/topology-external-hugr.yaml
    overlays: [configs/overlay-park-cap.yaml]
    requires: [anthropic, hugr]
    scenarios:
      - parked_ceiling_drop
